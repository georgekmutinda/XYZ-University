name: Deploy XYZ University API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    # Use the 'self-hosted' runner we installed on your ProBook
    runs-on: self-hosted

    steps:
      # 1. Pull the latest code from GitHub into the runner's work folder
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Run the deployment commands directly on the ProBook
      - name: Rebuild and Start Containers
        run: |
          # Step into the folder where docker-compose.yml lives
          cd ${{ github.workspace }}/XYZUniversityAPI
          
          # Stop old containers and rebuild the API image
          docker compose down
          docker compose up -d --build
          
          # Clean up dangling images to save space
          docker image prune -f

      # 3. Final verification to ensure containers are Up
      - name: Verify Status
        run: |
          cd ${{ github.workspace }}/XYZUniversityAPI
          docker compose ps
