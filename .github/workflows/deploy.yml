name: Deploy XYZ University API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    # Use the label you created during runner setup
    runs-on: self-hosted

    steps:
      # 1. This pulls your code from GitHub into the runner's folder on your ProBook
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. These commands run directly on your ProBook terminal
      - name: Rebuild and Start Containers
        run: |
          # The checkout action puts your code in a special folder. 
          # We go there, build the image, and start the stack.
          cd ${{ github.workspace }}
          
          # Force a rebuild to catch any code changes
          docker compose down
          docker compose up -d --build
          
          # Optional: remove old images to save disk space on the ProBook
          docker image prune -f

      # 3. Quick check to see if everything is running
      - name: Verify Status
        run: docker compose ps
