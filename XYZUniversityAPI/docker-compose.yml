version: '3.9'

services:
  # University API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xyz_university_api
    ports:
      - "5251:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=XYZUniversityDB;Username=postgres;Password=your_password
      - Redis__Connection=redis:6379
      - RabbitMQ__Host=rabbitmq
      - JwtSettings__SecretKey=YOUR_SECURE_LONG_KEY_HERE
    volumes:
      # Map host 'Logs' folder to container '/app/Logs' for persistent logging
      - ./Logs:/app/Logs
    depends_on:
      - postgres
      - redis
      - rabbitmq
    restart: always

  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: xyz_postgres
    environment:
      POSTGRES_DB: XYZUniversityDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gkyalo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: xyz_redis
    ports:
      - "6379:6379"

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: xyz_rabbitmq
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management Dashboard
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

volumes:
  # Named volume for Postgres persistence
  postgres_data:
